name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Tests
        run: bun test
      - name: Typecheck (browsemode)
        working-directory: packages/browsemode
        run: bunx tsc --noEmit
      - name: Typecheck (pi-browse)
        working-directory: packages/pi-browse
        run: bunx tsc --noEmit
      - name: Lint
        run: bunx biome check packages/
