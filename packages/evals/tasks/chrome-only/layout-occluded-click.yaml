name: layout-occluded-click
task: |
  Use page.eval to build a test page on about:blank with a button
  covered by a translucent overlay div (the overlay has a higher
  z-index and intercepts pointer events). The button's onclick
  sets document.title to "clicked". Then call page.scan(), call
  page.click on the button by its scanned name, and report the
  resulting page title. The browsemode six-step click pipeline
  should detect the occlusion via document.elementFromPoint and
  fall back to JS .click() to bypass pointer events.
url: about:blank
tags: [click, layout, watchdog, chrome-only]
only: [chrome]
budget:
  maxSteps: 8
  timeoutSec: 200

script: |
  // Build the page: a button + a covering div that intercepts pointer
  // events. JS .click() bypasses pointer-events; CDP mouse dispatch
  // would route to the cover.
  await page.eval(`
    document.body.innerHTML = \`
      <button id=b style="position:fixed;top:50px;left:60px;width:120px;height:40px"
              onclick="document.title='clicked'">Sign in</button>
      <div    id=c style="position:fixed;top:50px;left:60px;width:120px;height:40px;background:red;opacity:0.5"></div>\`;
  `);
  await page.scan();
  await page.click("Sign in");
  await page.wait(100);
  return await page.title();

judge:
  must:
    - "clicked"
