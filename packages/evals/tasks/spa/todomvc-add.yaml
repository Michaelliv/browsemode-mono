name: todomvc-add
task: |
  Open the TodoMVC React example, add three todos
  ("write evals", "ship browsemode", "celebrate"), then report
  the visible todo count from the page footer.
url: https://todomvc.com/examples/react/dist/
tags: [spa, form, chrome-only]
# Obscura v0.1.x doesn't fully bootstrap this React app — the JS
# bundles report loaded:false and the React root has 0 children
# even after a 5s settle. Pinning to chrome until obscura's SPA
# support catches up.
only: [chrome]
budget:
  maxSteps: 8
  timeoutSec: 90

script: |
  await page.scan();
  // SPAs that mount after load: settle, then rescan for fresh handles.
  await page.waitFor({ stable: { forMs: 1000 } });
  await page.scan();
  const input = (await page.list()).find((n) => n === "newTodoInput" || n === "newTodo" || n === "textInput" || /todo.*input|textInput|whatNeeds/i.test(n));
  if (!input) throw new Error("Todo input not found");
  for (const text of ["write evals", "ship browsemode", "celebrate"]) {
    await page[input].fill(text);
    await page[input].press("Enter");
  }
  await page.waitFor({ stable: { forMs: 500 } });
  return await page.html();

judge:
  must:
    - "3 items left"
