name: wikipedia-search
task: |
  Open the English Wikipedia main page, type "Tim Berners-Lee" into
  the search input, submit the search, and report the title of the
  page that loads.
url: https://en.wikipedia.org/wiki/Main_Page
tags: [search, form, static]
budget:
  maxSteps: 6
  timeoutSec: 60

# direct-sdk version uses named elements; the catalog is rebuilt
# after each navigation so the search input survives.
script: |
  await page.scan();
  const initial = await page.list();
  if (!initial.includes("searchWikipediaInput") && initial.includes("searchWikipediaCtrlOptionFLink")) {
    await page.searchWikipediaCtrlOptionFLink.click();
    await page.waitFor({ stable: { forMs: 500 } });
    await page.scan();
  }
  const input = (await page.list()).find((n) => n === "searchInput" || n === "searchWikipediaInput" || /search.*input/i.test(n));
  if (!input) throw new Error("Wikipedia search input not found");
  await page[input].fill("Tim Berners-Lee");
  await page[input].press("Enter");
  await page.waitFor({ stable: { forMs: 1500 } });
  return await page.title();

judge:
  must:
    - "tim berners-lee"
