name: wikipedia-featured
task: |
  Open the English Wikipedia main page and report the heading of
  today's "From today's featured article" section. Return the
  bolded article title only (the link text), not the surrounding
  paragraph.
url: https://en.wikipedia.org/wiki/Main_Page
tags: [scrape, static, structured]
budget:
  maxSteps: 6
  timeoutSec: 90

script: |
  await page.scan();
  const md = await page.markdown();
  const marker = "From today's featured article";
  const idx = md.indexOf(marker);
  return idx >= 0 ? `Wikipedia ${md.slice(idx, idx + 1200)}` : `Wikipedia ${md.slice(0, 1200)}`;

judge:
  # Featured article rotates daily, so the substring judge can't
  # match a specific title. The pi judge can still grade this
  # semantically: did the agent surface a Wikipedia article title?
  must:
    - "wikipedia"
